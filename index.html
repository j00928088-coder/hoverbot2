<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HoverBot Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg:     #0a0c10;
    --panel:  #111520;
    --border: #1e2a3a;
    --accent: #00e5ff;
    --red:    #ff3d71;
    --green:  #00ff88;
    --orange: #ff9500;
    --purple: #9B59F5;
    --text:   #c8d8e8;
    --dim:    #3a4a5a;
    --glow:   0 0 18px rgba(0,229,255,0.4);
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
    background-size:32px 32px;
    pointer-events:none; z-index:0;
  }

  header {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 8px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#0d1018 0%,transparent 100%);
    flex-shrink:0;
  }

  .logo { font-size:20px; font-weight:700; letter-spacing:3px; color:var(--accent); text-shadow:var(--glow); }
  .logo span { color:var(--red); }

  .status-bar { display:flex; align-items:center; gap:8px; font-family:'Share Tech Mono',monospace; font-size:11px; }

  #status-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--dim); transition:all 0.3s;
  }
  #status-dot.connected   { background:var(--green); box-shadow:0 0 8px var(--green); }
  #status-dot.connecting  { background:var(--orange); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #status-text { color:var(--dim); transition:color 0.3s; }
  #status-text.connected { color:var(--green); }

  #connect-btn {
    background:linear-gradient(135deg,var(--accent),#0088aa);
    color:#000; border:none; border-radius:6px;
    padding:6px 14px;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px; letter-spacing:1px;
    cursor:pointer; box-shadow:var(--glow); transition:all 0.2s;
  }
  #connect-btn:active { transform:scale(0.96); }
  #connect-btn.connected { background:linear-gradient(135deg,var(--red),#aa0030); box-shadow:0 0 18px rgba(255,61,113,0.4); }

  main {
    flex:1; position:relative; z-index:10;
    display:flex; flex-direction:column; gap:10px;
    padding:10px 12px; overflow:hidden;
  }

  /* Telemetry */
  .telemetry { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; flex-shrink:0; }
  .tele-item { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:5px 6px; text-align:center; }
  .tele-label { font-size:8px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; }
  .tele-val { font-family:'Share Tech Mono',monospace; font-size:15px; color:var(--accent); line-height:1.2; }

  /* Controls row */
  .controls-row { display:flex; gap:12px; flex:1; align-items:center; min-height:0; }

  /* Joystick */
  .joystick-wrap { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .joystick-label { font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }

  #joystick-base {
    width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#1a2535,#0d1018);
    border:2px solid var(--border);
    box-shadow:inset 0 4px 20px rgba(0,0,0,0.5);
    position:relative; touch-action:none; cursor:pointer;
  }
  #joystick-base::before,#joystick-base::after { content:''; position:absolute; background:var(--border); }
  #joystick-base::before { width:1px; height:100%; left:50%; transform:translateX(-50%); }
  #joystick-base::after  { height:1px; width:100%; top:50%; transform:translateY(-50%); }

  #joystick-thumb {
    width:52px; height:52px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#2a4060,#0d1825);
    border:2px solid var(--accent);
    box-shadow:var(--glow);
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none; transition:box-shadow 0.15s;
  }
  #joystick-thumb.active { box-shadow:0 0 28px rgba(0,229,255,0.8); }

  /* Button pad */
  .btn-pad { flex:1; display:flex; flex-direction:column; gap:7px; }

  .btn-row { display:flex; gap:7px; justify-content:center; }

  .ctrl-btn {
    border:none; border-radius:10px;
    font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1.5px;
    cursor:pointer; transition:all 0.1s;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  }
  .ctrl-btn:active { transform:scale(0.92); }

  .dir-btn {
    width:62px; height:62px;
    background:var(--panel); border:1.5px solid var(--border);
    color:var(--text); font-size:22px;
  }
  .dir-btn.pressed,
  .dir-btn:active {
    background:rgba(0,229,255,0.15);
    border-color:var(--accent); color:var(--accent);
    box-shadow:var(--glow);
  }
  .dir-label { font-size:8px; letter-spacing:1px; opacity:0.6; }

  .brake-btn {
    width:100%; height:50px;
    background:linear-gradient(135deg,#2a0a0a,#1a0505);
    border:1.5px solid #5a1010; color:var(--red);
    font-size:13px; letter-spacing:3px;
  }
  .brake-btn:active { background:linear-gradient(135deg,#5a0a0a,#3a0505); box-shadow:0 0 18px rgba(255,61,113,0.5); }

  .release-btn {
    width:100%; height:38px;
    background:linear-gradient(135deg,#0a2a0a,#051505);
    border:1.5px solid #105a10; color:var(--green);
    font-size:11px; letter-spacing:2px;
  }
  .release-btn:active { background:linear-gradient(135deg,#0a4a0a,#052505); box-shadow:0 0 16px rgba(0,255,136,0.4); }

  /* Speed */
  .speed-wrap { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px 12px; flex-shrink:0; }
  .speed-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .speed-title { font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
  #speed-display { font-family:'Share Tech Mono',monospace; font-size:17px; color:var(--accent); }

  #speed-slider {
    -webkit-appearance:none; appearance:none;
    width:100%; height:6px; border-radius:3px;
    background:var(--border); outline:none;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#0088aa);
    box-shadow:var(--glow); cursor:pointer;
  }

  /* Special */
  .special-row { display:grid; grid-template-columns:1fr 1fr; gap:7px; flex-shrink:0; }
  .special-btn {
    height:42px; background:var(--panel); border:1.5px solid var(--border);
    border-radius:10px; color:var(--text);
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:11px; letter-spacing:2px;
    cursor:pointer; transition:all 0.15s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .special-btn:active { transform:scale(0.95); }
  .special-btn.spin   { border-color:var(--orange); color:var(--orange); }
  .special-btn.patrol { border-color:var(--purple); color:var(--purple); }
  .special-btn.spin:active   { background:rgba(255,149,0,0.15); }
  .special-btn.patrol:active { background:rgba(155,89,245,0.15); }

  /* Log */
  #log {
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:6px 10px; height:55px; overflow-y:auto;
    font-family:'Share Tech Mono',monospace; font-size:9.5px; color:var(--dim);
    flex-shrink:0;
  }
  #log p { line-height:1.6; }
  #log p.tx  { color:var(--accent); }
  #log p.rx  { color:var(--green); }
  #log p.err { color:var(--red); }

  /* Overlay */
  #overlay {
    position:fixed; inset:0;
    background:rgba(10,12,16,0.95);
    z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    backdrop-filter:blur(6px);
  }
  #overlay.hidden { display:none; }
  .overlay-icon { font-size:54px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .overlay-title { font-size:26px; font-weight:700; letter-spacing:4px; color:var(--accent); text-shadow:var(--glow); }
  .overlay-sub  { font-size:13px; color:var(--dim); letter-spacing:1px; text-align:center; padding:0 36px; line-height:1.7; }
  #overlay-btn  {
    background:linear-gradient(135deg,var(--accent),#0088aa);
    color:#000; border:none; border-radius:10px;
    padding:13px 38px;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:16px; letter-spacing:2px;
    cursor:pointer; box-shadow:var(--glow); transition:all 0.2s;
  }
  #overlay-btn:active { transform:scale(0.96); }
  .ble-note { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--dim); text-align:center; padding:0 28px; }
</style>
</head>
<body>

<div id="overlay">
  <div class="overlay-icon">🤖</div>
  <div class="overlay-title">HOVERBOT</div>
  <div class="overlay-sub">Tap connect to pair with your<br>ESP32 over Bluetooth LE</div>
  <button id="overlay-btn" onclick="connectBLE()">CONNECT</button>
  <div class="ble-note">Make sure HoverBot is powered on<br>Use Safari on iPhone iOS 16.4+</div>
</div>

<header>
  <div class="logo">HOVER<span>BOT</span></div>
  <div class="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">DISCONNECTED</span>
  </div>
  <button id="connect-btn" onclick="connectBLE()">CONNECT</button>
</header>

<main>
  <!-- Telemetry -->
  <div class="telemetry">
    <div class="tele-item"><div class="tele-label">SPEED</div><div class="tele-val" id="t-speed">0%</div></div>
    <div class="tele-item"><div class="tele-label">DIR</div><div class="tele-val" id="t-dir">FWD</div></div>
    <div class="tele-item"><div class="tele-label">BRAKE</div><div class="tele-val" id="t-brake" style="color:var(--red)">ON</div></div>
    <div class="tele-item"><div class="tele-label">MODE</div><div class="tele-val" id="t-mode">IDLE</div></div>
  </div>

  <!-- Controls -->
  <div class="controls-row">

    <!-- Joystick -->
    <div class="joystick-wrap">
      <div class="joystick-label">JOYSTICK</div>
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>

    <!-- Button Pad -->
    <div class="btn-pad">
      <div class="btn-row">
        <button class="ctrl-btn dir-btn" id="btn-fwd"
          ontouchstart="btnFwd(true)"  ontouchend="btnFwd(false)"
          onmousedown="btnFwd(true)"   onmouseup="btnFwd(false)" onmouseleave="btnFwd(false)">
          ▲<div class="dir-label">FWD</div>
        </button>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn dir-btn" id="btn-left"
          ontouchstart="btnLeft(true)"  ontouchend="btnLeft(false)"
          onmousedown="btnLeft(true)"   onmouseup="btnLeft(false)" onmouseleave="btnLeft(false)">
          ◀<div class="dir-label">LEFT</div>
        </button>
        <button class="ctrl-btn dir-btn" id="btn-right"
          ontouchstart="btnRight(true)"  ontouchend="btnRight(false)"
          onmousedown="btnRight(true)"   onmouseup="btnRight(false)" onmouseleave="btnRight(false)">
          ▶<div class="dir-label">RIGHT</div>
        </button>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn dir-btn" id="btn-rev"
          ontouchstart="btnRev(true)"  ontouchend="btnRev(false)"
          onmousedown="btnRev(true)"   onmouseup="btnRev(false)" onmouseleave="btnRev(false)">
          ▼<div class="dir-label">REV</div>
        </button>
      </div>
      <button class="ctrl-btn brake-btn"   ontouchstart="doBrake()"   onmousedown="doBrake()">⛔ BRAKE</button>
      <button class="ctrl-btn release-btn" ontouchstart="doRelease()" onmousedown="doRelease()">✅ RELEASE</button>
    </div>
  </div>

  <!-- Speed -->
  <div class="speed-wrap">
    <div class="speed-header">
      <span class="speed-title">SPEED</span>
      <span id="speed-display">21%</span>
    </div>
    <input type="range" id="speed-slider" min="0" max="255" value="55" oninput="onSpeedChange(this.value)">
  </div>

  <!-- Special -->
  <div class="special-row">
    <button class="special-btn spin"   ontouchstart="sendCmd('spin360')" onmousedown="sendCmd('spin360')">🔄 SPIN 360</button>
    <button class="special-btn patrol" ontouchstart="sendCmd('patrol')"  onmousedown="sendCmd('patrol')">🚔 PATROL</button>
  </div>

  <!-- Log -->
  <div id="log"><p>Waiting for connection...</p></div>
</main>

<script>
// ── BLE UUIDs ───────────────────────────────────────────────
const SVC_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // notify  (ESP32 → phone)
const RX_UUID  = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // write   (phone  → ESP32)

let bleDevice = null;
let rxChar    = null;
let connected = false;

// State
let speed     = 55;
let brakeOn   = true;

// Send queue — avoid flooding BLE
let sendQueue  = [];
let sending    = false;

async function flushQueue() {
  if (sending || sendQueue.length === 0) return;
  sending = true;
  while (sendQueue.length > 0) {
    const cmd = sendQueue.shift();
    try {
      await rxChar.writeValueWithoutResponse(new TextEncoder().encode(cmd + '\n'));
      addLog('→ ' + cmd, 'tx');
    } catch(e) {
      addLog('err: ' + e.message, 'err');
    }
    await new Promise(r => setTimeout(r, 80)); // 80ms between commands
  }
  sending = false;
}

function sendCmd(cmd) {
  if (!connected || !rxChar) { addLog('Not connected!', 'err'); return; }
  // Replace duplicates for speed commands to avoid queue buildup
  if (cmd.startsWith('s')) sendQueue = sendQueue.filter(c => !c.startsWith('s'));
  sendQueue.push(cmd);
  flushQueue();
}

function sendSeq(...cmds) {
  cmds.forEach(c => sendQueue.push(c));
  flushQueue();
}

// ── Connect ─────────────────────────────────────────────────
async function connectBLE() {
  if (!navigator.bluetooth) {
    alert('Web Bluetooth not supported.\nUse Safari on iPhone iOS 16.4+');
    return;
  }
  try {
    setStatus('connecting');
    addLog('Scanning for HoverBot...');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'HoverBot' }],
      optionalServices: [SVC_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnect);
    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SVC_UUID);
    rxChar        = await service.getCharacteristic(RX_UUID);
    const txChar  = await service.getCharacteristic(TX_UUID);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onReceive);
    setStatus('connected');
    addLog('Connected!', 'rx');
    document.getElementById('overlay').classList.add('hidden');
    // Safe start — release brake
    setTimeout(() => sendCmd('r'), 500);
  } catch(e) {
    setStatus('disconnected');
    addLog('Failed: ' + e.message, 'err');
  }
}

function onDisconnect() {
  setStatus('disconnected');
  rxChar = null;
  addLog('Disconnected!', 'err');
  document.getElementById('overlay').classList.remove('hidden');
}

function onReceive(e) {
  const val = new TextDecoder().decode(e.target.value).trim();
  addLog('← ' + val, 'rx');
  if (val.includes('RELEASED'))        { brakeOn = false; updateBrakeTele(false); }
  if (val.includes('Brake: ON'))       { brakeOn = true;  updateBrakeTele(true);  }
  if (val.includes('FORWARD'))         { document.getElementById('t-dir').textContent  = 'FWD'; }
  if (val.includes('REVERSE'))         { document.getElementById('t-dir').textContent  = 'REV'; }
  if (val.includes('[SPIN]'))          { document.getElementById('t-mode').textContent = 'SPIN'; }
  if (val.includes('[PATROL]'))        { document.getElementById('t-mode').textContent = 'PAT'; }
  if (val.includes('Done')||val.includes('resume')) { document.getElementById('t-mode').textContent = 'IDLE'; }
}

// ── Status UI ────────────────────────────────────────────────
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const btn = document.getElementById('connect-btn');
  dot.className = state;
  txt.className = state === 'connected' ? 'connected' : '';
  connected = state === 'connected';
  if (state === 'connected') {
    txt.textContent = 'CONNECTED';
    btn.textContent = 'DISCONNECT';
    btn.classList.add('connected');
    btn.onclick = () => { bleDevice && bleDevice.gatt.disconnect(); };
  } else {
    txt.textContent = state === 'connecting' ? 'CONNECTING' : 'DISCONNECTED';
    btn.textContent = state === 'connecting' ? 'CANCEL' : 'CONNECT';
    btn.classList.remove('connected');
    btn.onclick = connectBLE;
  }
}

function updateBrakeTele(on) {
  const el = document.getElementById('t-brake');
  el.textContent = on ? 'ON' : 'OFF';
  el.style.color = on ? 'var(--red)' : 'var(--green)';
}

function addLog(msg, type='') {
  const el = document.getElementById('log');
  const p  = document.createElement('p');
  if (type) p.className = type;
  p.textContent = msg;
  el.appendChild(p);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 40) el.removeChild(el.firstChild);
}

// ── Speed ────────────────────────────────────────────────────
function onSpeedChange(val) {
  speed = parseInt(val);
  const pct = Math.round((speed * 100) / 255);
  document.getElementById('speed-display').textContent = pct + '%';
  document.getElementById('t-speed').textContent = pct + '%';
}

// ── Direction Buttons ────────────────────────────────────────
function ensureReleased() {
  if (brakeOn) {
    sendCmd('r');
    brakeOn = false;
    updateBrakeTele(false);
  }
}

function btnFwd(pressed) {
  document.getElementById('btn-fwd').classList.toggle('pressed', pressed);
  if (pressed) {
    ensureReleased();
    sendSeq('d0', 's' + speed);
    document.getElementById('t-dir').textContent  = 'FWD';
    document.getElementById('t-mode').textContent = 'DRIVE';
  } else {
    sendCmd('s0');
    document.getElementById('t-mode').textContent = 'IDLE';
  }
}

function btnRev(pressed) {
  document.getElementById('btn-rev').classList.toggle('pressed', pressed);
  if (pressed) {
    ensureReleased();
    sendSeq('d1', 's' + speed);
    document.getElementById('t-dir').textContent  = 'REV';
    document.getElementById('t-mode').textContent = 'DRIVE';
  } else {
    sendCmd('s0');
    document.getElementById('t-mode').textContent = 'IDLE';
  }
}

function btnLeft(pressed) {
  document.getElementById('btn-left').classList.toggle('pressed', pressed);
  if (pressed) {
    ensureReleased();
    const lo = Math.max(0, Math.round(speed * 0.25));
    sendSeq('d0', 's1' + lo, 's2' + speed);
    document.getElementById('t-mode').textContent = 'LEFT';
  } else {
    sendCmd('s0');
    document.getElementById('t-mode').textContent = 'IDLE';
  }
}

function btnRight(pressed) {
  document.getElementById('btn-right').classList.toggle('pressed', pressed);
  if (pressed) {
    ensureReleased();
    const lo = Math.max(0, Math.round(speed * 0.25));
    sendSeq('d0', 's1' + speed, 's2' + lo);
    document.getElementById('t-mode').textContent = 'RIGHT';
  } else {
    sendCmd('s0');
    document.getElementById('t-mode').textContent = 'IDLE';
  }
}

function doBrake() {
  sendCmd('b');
  brakeOn = true;
  updateBrakeTele(true);
  document.getElementById('t-mode').textContent = 'IDLE';
}

function doRelease() {
  sendCmd('r');
  brakeOn = false;
  updateBrakeTele(false);
}

// ── JOYSTICK ─────────────────────────────────────────────────
const base  = document.getElementById('joystick-base');
const thumb = document.getElementById('joystick-thumb');
const RADIUS = 50;
let jsActive = false;
let jsTimer  = null;
let lastCmd  = '';

function jsGetXY(e) {
  const rect = base.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const touch = e.touches ? e.touches[0] : e;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > RADIUS) { dx *= RADIUS/dist; dy *= RADIUS/dist; }
  return { dx, dy };
}

function jsStart(e) {
  e.preventDefault();
  jsActive = true;
  thumb.classList.add('active');
  ensureReleased();
  jsTimer = setInterval(jsTick, 100);
}

function jsMove(e) {
  e.preventDefault();
  if (!jsActive) return;
  const {dx, dy} = jsGetXY(e);
  thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  base._jx = dx / RADIUS;
  base._jy = -dy / RADIUS;
}

function jsEnd(e) {
  e.preventDefault();
  jsActive = false;
  clearInterval(jsTimer);
  thumb.classList.remove('active');
  thumb.style.transform = 'translate(-50%,-50%)';
  base._jx = 0; base._jy = 0;
  sendCmd('s0');
  lastCmd = '';
  document.getElementById('t-mode').textContent = 'IDLE';
}

function jsTick() {
  const jx = base._jx || 0;
  const jy = base._jy || 0;
  const deadzone = 0.12;
  if (Math.abs(jx) < deadzone && Math.abs(jy) < deadzone) {
    if (lastCmd !== 'stop') { sendCmd('s0'); lastCmd = 'stop'; }
    return;
  }
  const fwd = jy >= 0;
  const spd = Math.round(Math.abs(jy) * speed);
  let s1 = spd, s2 = spd;
  if (jx >  deadzone) s1 = Math.max(0, Math.round(spd * (1 - Math.abs(jx))));
  if (jx < -deadzone) s2 = Math.max(0, Math.round(spd * (1 - Math.abs(jx))));

  const cmd = `${fwd?'d0':'d1'}-s1${s1}-s2${s2}`;
  if (cmd === lastCmd) return;
  lastCmd = cmd;

  sendSeq(fwd ? 'd0' : 'd1', 's1' + s1, 's2' + s2);
  document.getElementById('t-dir').textContent  = fwd ? 'FWD' : 'REV';
  document.getElementById('t-mode').textContent = fwd ? 'FWD' : 'REV';
  const pct = Math.round((Math.max(s1,s2)*100)/255);
  document.getElementById('t-speed').textContent = pct + '%';
}

base.addEventListener('touchstart', jsStart, { passive:false });
base.addEventListener('touchmove',  jsMove,  { passive:false });
base.addEventListener('touchend',   jsEnd,   { passive:false });
base.addEventListener('mousedown',  jsStart);
base.addEventListener('mousemove',  (e) => { if(jsActive) { jsMove(e); const {dx,dy}=jsGetXY(e); thumb.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; base._jx=dx/RADIUS; base._jy=-dy/RADIUS; } });
base.addEventListener('mouseup',    jsEnd);
</script>
</body>
</html>
